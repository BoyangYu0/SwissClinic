name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  checks:
    name: Typecheck, Lint, Test, Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Validate crawl inputs
        run: pnpm crawl -- --sources packages/sources/sources.yaml --out data/snapshots/ci-dry-run --dry-run

      - name: Validate coverage reports
        run: pnpm coverage:report -- --sources packages/sources/sources.yaml --data data/current --out data/current

      - name: Validate reliability audit
        run: pnpm reliability:audit -- --data data/current --sources packages/sources/sources.yaml --out data/current

      - name: Validate lead-time reports
        run: pnpm lead-time:build -- --data data/current

      - name: Validate static data
        run: pnpm data:validate -- --data data/current
