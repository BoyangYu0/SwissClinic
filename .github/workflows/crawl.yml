name: Crawl Data Refresh

on:
  workflow_dispatch:
    inputs:
      create_pull_request:
        description: "Open a pull request with generated data changes"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      timeout_ms:
        description: "Per-page fetch timeout in milliseconds"
        required: true
        default: "15000"
        type: string
      max_retries:
        description: "Retries for transient fetch errors"
        required: true
        default: "1"
        type: string
      respect_delay_ms:
        description: "Delay between fetched URLs in milliseconds"
        required: true
        default: "1000"
        type: string

  # Schedule intentionally disabled until manual review gates are complete.
  # Before enabling, review source-coverage.md, reliability-audit.md, review-needed.md,
  # crawl frequency, and multilingual/native-language verification status.
  # schedule:
  #   - cron: "17 4 * * 1"

permissions:
  contents: write
  pull-requests: write

jobs:
  crawl:
    name: Manual Crawl And Data Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Validate source registry with dry-run crawl
        run: pnpm crawl -- --sources packages/sources/sources.yaml --out data/snapshots/dry-run --dry-run

      - name: Generate pre-crawl coverage reports
        run: pnpm coverage:report -- --sources packages/sources/sources.yaml --data data/current --out data/current

      - name: Crawl official source pages
        run: pnpm crawl -- --sources packages/sources/sources.yaml --out data/snapshots/current-run --timeout-ms "${{ inputs.timeout_ms || '15000' }}" --max-retries "${{ inputs.max_retries || '1' }}" --respect-delay-ms "${{ inputs.respect_delay_ms || '1000' }}"

      - name: Summarize crawl report
        run: |
          node -e "const r=require('./data/snapshots/current-run/crawler-report.json'); console.log(JSON.stringify({sourceCount:r.sourceCount,urlCount:r.urlCount,successCount:r.successCount,failureCount:r.failureCount,skippedCount:r.skippedCount,duplicateUrlCount:r.duplicateUrlCount}, null, 2));"
          {
            echo "## Crawl report"
            echo ""
            node -e "const r=require('./data/snapshots/current-run/crawler-report.json'); console.log('- Sources: '+r.sourceCount); console.log('- URLs: '+r.urlCount); console.log('- Successes: '+r.successCount); console.log('- Failures: '+r.failureCount); console.log('- Skipped: '+r.skippedCount); console.log('- Duplicates: '+r.duplicateUrlCount);"
            echo ""
            echo "Review data/snapshots/current-run/crawler-report.json before merging generated data."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Build static data
        run: pnpm build:data -- --snapshots data/snapshots/current-run --out data/current --sources packages/sources/sources.yaml --exports data/exports

      - name: Generate lead-time reports
        run: pnpm lead-time:build -- --data data/current

      - name: Generate review-needed report
        run: pnpm review:report -- --data data/current --out data/current/review-needed.md

      - name: Generate coverage reports
        run: pnpm coverage:report -- --sources packages/sources/sources.yaml --data data/current --out data/current

      - name: Generate reliability audit
        run: pnpm reliability:audit -- --data data/current --sources packages/sources/sources.yaml --out data/current

      - name: Validate generated static data
        run: pnpm data:validate -- --data data/current

      - name: Build static site
        run: pnpm build

      - name: Upload generated data artifact
        uses: actions/upload-artifact@v4
        with:
          name: swiss-clinical-placement-generated-data
          path: |
            data/current/
            data/exports/
            data/snapshots/current-run/crawler-report.json
            apps/web/dist/site/

      - name: Create pull request
        if: github.event_name == 'schedule' || inputs.create_pull_request == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          branch: data/manual-crawl-refresh
          delete-branch: true
          title: "chore(data): refresh crawl outputs"
          commit-message: "chore(data): refresh crawl outputs"
          body: |
            Manual crawl refresh generated by GitHub Actions.

            Review before merging:
            - data/current/review-needed.md
            - data/current/reliability-audit.md
            - data/current/source-coverage.md
            - data/current/institution-coverage.md
            - data/current/record-coverage.md
            - data/current/coverage-by-baseline.md
            - data/current/lead-time-summary.json
            - data/snapshots/current-run/crawler-report.json
          labels: data-refresh
