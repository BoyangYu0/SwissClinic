name: Report wrong placement data
description: Report incorrect availability, department, application link, language, or confidence.
title: "[Wrong data] "
labels:
  - feedback
  - wrong-data
  - needs-triage
body:
  - type: markdown
    attributes:
      value: |
        Thanks for checking the static beta. Please use the JSON generated by the site when possible.
        Do not paste private emails, patient information, or unredacted screenshots.
  - type: input
    id: record_id
    attributes:
      label: Record ID or source ID
      description: Paste the placement record ID or source ID from the site.
    validations:
      required: true
  - type: dropdown
    id: feedback_type
    attributes:
      label: What is wrong?
      options:
        - Wrong availability
        - Wrong department
        - Wrong application link
        - Wrong language/region
        - Other
    validations:
      required: true
  - type: textarea
    id: metadata
    attributes:
      label: Auto-filled metadata from the site
      description: Paste the generated JSON block if available.
      render: json
    validations:
      required: false
  - type: textarea
    id: current_and_corrected_value
    attributes:
      label: Current value and corrected value
      description: Describe what the site shows now and what the official source supports instead.
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Public evidence
      description: Link the official public source page and explain the relevant wording. Do not include private attachments.
    validations:
      required: true
  - type: dropdown
    id: reviewer_role
    attributes:
      label: Reviewer role
      options:
        - Prefer not to say
        - Medical student
        - Resident
        - Doctor
        - Hospital administrator
        - Maintainer
        - Other
    validations:
      required: true
