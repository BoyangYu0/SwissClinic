name: Structured placement feedback
description: Report extracted placement, source, parser, or coverage issues.
title: "[Feedback] "
labels:
  - feedback
  - needs-triage
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping verify the static beta. Do not paste private emails, patient information, or unredacted screenshots.
  - type: dropdown
    id: feedback_type
    attributes:
      label: Feedback type
      options:
        - Wrong availability
        - Wrong department
        - Wrong application link
        - Missing hospital/source
        - Irrelevant source
        - Broken source URL
        - Wrong language/region
        - Parser bug
        - Other
    validations:
      required: true
  - type: textarea
    id: metadata
    attributes:
      label: Auto-filled metadata
      description: Keep the JSON block generated by the static site when possible.
      render: json
    validations:
      required: false
  - type: textarea
    id: expected_correction
    attributes:
      label: What should change?
      description: Link to the official source page and describe the correction.
    validations:
      required: true
  - type: textarea
    id: maintainer_triage
    attributes:
      label: Maintainer triage notes
      description: Maintainers can note parser fixture, source registry, or report updates here.
    validations:
      required: false
